server:
  servlet:
    context-path: /api

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/homebanking?options=-c%20TimeZone%3DUTC
    driverClassName: org.postgresql.Driver
    username: root
    password: password
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localhost:4566

# Personalized properties
queue:
  transfers: transfers-queue

client:
  dolar-api:
      url: https://dolarapi.com

# Springwolf configuration
springwolf:
  docket:
    servers:
      sqs:
        protocol: sqs
        host: ${spring.cloud.aws.sqs.endpoint}
    base-package: com.cac.homebanking
    info:
      title: Home Banking API
      version: 1.0.0
      description: This is the Home Banking API for managing accounts, transfers, and transactions.
        It provides endpoints for account management, transfer processing, and transaction history.